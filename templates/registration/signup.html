{% extends "base.html" %}

{% block title %}Sign up — Bcalshi{% endblock %}

{% block content %}
<div class="card" style="max-width:380px; margin:40px auto;">
    <h1>Create Account</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-green" style="width:100%;">Sign Up</button>
    </form>

    <p class="muted" style="font-size:13px;">
        Already have an account? <a href="/accounts/login/">Login</a>
    </p>
</div>
{% endblock %}
